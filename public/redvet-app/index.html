  <style>

    /* Columna derecha para publicidad (similar a Photopea) */

  <script>
    // Ancho mínimo de ventana para mostrar la columna de publicidad.
    // 320 (ads) + 320 (app igual de ancha que los ads) + 40 (padding) + 2 (border) = 682 → 700.
    var RR_ADS_MIN_WIDTH = 700;
    var __rrIsAdFreeUser = false;
    var __rrLocalSidebarAd = null;
    var __rrCanSeeVerifiedVetOnlyAds = false;
    var __rrDefaultSidebarAdHtml = '';

    window.__rrSetCanSeeVerifiedVetOnlyAds = function (value) {
      __rrCanSeeVerifiedVetOnlyAds = !!value;
    };

    window.__rrApplyLocalSidebarAd = function (payload) {
      var link = document.getElementById('rr-ad-banner-link');
      if (!link) return;

      if (!payload || !payload.mediaUrl) {
        __rrLocalSidebarAd = null;
        link.setAttribute(
          'aria-label',
          '¿Aún sin IA en tu clínica? Prueba RedVet IA 3 días gratis'
        );
        link.innerHTML =
          __rrDefaultSidebarAdHtml ||
          '<img src="/images/landing-nueva/ad-redvet-ia-300x600.png" alt="RedVet IA" />';
        return;
      }

      var title = (payload.title || 'Publicidad').toString();
      __rrLocalSidebarAd = {
        campaignId: (payload.campaignId || '').toString(),
        mediaUrl: (payload.mediaUrl || '').toString(),
        targetUrl: (payload.targetUrl || '').toString(),
        title: title,
      };
      link.setAttribute('aria-label', title);
      link.innerHTML =
        '<img src="' +
        __rrLocalSidebarAd.mediaUrl +
        '" alt="' +
        title.replace(/"/g, '&quot;') +
        '" />';
    };

    function looksLikeSidebarEmail(value) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
    }

    function resolveSidebarAdLaunchUrl(url) {
      var trimmed = (url || '').trim();
      if (!trimmed) return '';

      if (trimmed.charAt(0) === '#') return trimmed;

      var lower = trimmed.toLowerCase();
      if (
        lower.indexOf('mailto:') === 0 ||
        lower.indexOf('tel:') === 0 ||
        lower.indexOf('whatsapp:') === 0
      ) {
        return trimmed;
      }

      if (looksLikeSidebarEmail(trimmed)) {
        return 'mailto:' + trimmed;
      }

      if (lower.indexOf('http://') !== 0 && lower.indexOf('https://') !== 0) {
        return 'https://' + trimmed;
      }

      return trimmed;
    }

    function launchSidebarAdTarget(url) {
      var launchUrl = resolveSidebarAdLaunchUrl(url);
      if (!launchUrl) return false;

      if (launchUrl.charAt(0) === '#') {
        if (window.location.hash === launchUrl) {
          window.dispatchEvent(new HashChangeEvent('hashchange'));
        } else {
          window.location.hash = launchUrl;
        }
        return true;
      }

      var lowerLaunchUrl = launchUrl.toLowerCase();
      if (
        lowerLaunchUrl.indexOf('mailto:') === 0 ||
        lowerLaunchUrl.indexOf('tel:') === 0 ||
        lowerLaunchUrl.indexOf('whatsapp:') === 0
      ) {
        window.location.href = launchUrl;
        return true;
      }

      window.open(launchUrl, '_blank', 'noopener,noreferrer');
      return true;
    }

    window.__rrApplyAdFreeFromApp = function (isAdFree) {
      __rrIsAdFreeUser = !!isAdFree;
      if (__rrIsAdFreeUser) {
        hideAdsColumn();
      } else {
        showAdsColumn();
      }
    };

    function isWindowWideEnoughForAds() {
      return window.matchMedia('(min-width: ' + (RR_ADS_MIN_WIDTH + 1) + 'px)').matches;
    }

    function showAdsColumn() {
      const adRight = document.getElementById('rr-ad-right');
      if (!adRight) return;
      if (__rrIsAdFreeUser) {
        adRight.style.display = 'none';
        return;
      }
      if (!isWindowWideEnoughForAds()) {
        adRight.style.display = 'none';
        return;
      }
      adRight.style.display = 'flex';
    }

    function hideAdsColumn() {
      const adRight = document.getElementById('rr-ad-right');
      if (!adRight) return;
      adRight.style.display = 'none';
    }

    // Re-evaluar visibilidad al redimensionar la ventana.
    window.addEventListener('resize', function () {
      if (__rrIsAdFreeUser) {
        hideAdsColumn();
      } else {
        showAdsColumn();
      }
    });

    // Réplica de SubscriptionService._refreshAdFreeFromFirestoreFallback + getter isAdFree.
    // Campo que define suscriptor (sin publicidad lateral): isAdFree (+ isAdFreeManualOverride).
    // NO usar clinicId del user doc: Flutter no lo incluye en candidatos de clínica.
    function resolveEffectiveAuthUid(fallbackUser) {
      if (typeof window.__rrGetAppUserId === 'function') {
        const flutterUid = window.__rrGetAppUserId();
        if (flutterUid) return flutterUid;
      }
      return fallbackUser && fallbackUser.uid ? fallbackUser.uid : null;
    }

    async function resolveIsAdFreeForUser(user) {
      const uid = resolveEffectiveAuthUid(user);
      if (!uid) return false;
      const db = firebase.firestore();
      const userDoc = await db.collection('users').doc(uid).get();
      const userData =
        userDoc.exists && userDoc.data() ? userDoc.data() : {};

      let userAdFree = null;
      let userAiEnabled = null;
      const manualOverride = userData.isAdFreeManualOverride === true;

      if (typeof userData.isAdFree === 'boolean') {
        userAdFree = userData.isAdFree;
      }
      if (typeof userData.isAiEnabled === 'boolean') {
        userAiEnabled = userData.isAiEnabled;
      }

      const clinicCandidates = [uid];
      if (Array.isArray(userData.associatedClinicIds)) {
        userData.associatedClinicIds.forEach(function (clinicId) {
          if (clinicId && !clinicCandidates.includes(clinicId)) {
            clinicCandidates.push(clinicId);
          }
        });
      }

      let clinicFieldExists = false;
      let clinicAiFieldExists = false;
      let clinicAdFree = false;
      let clinicAiEnabled = false;

      for (const clinicId of clinicCandidates) {
        const clinicDoc = await db.collection('clinics').doc(clinicId).get();
        if (!clinicDoc.exists) continue;

        const clinicData = clinicDoc.data() || {};
        if (typeof clinicData.isAdFree === 'boolean') {
          clinicFieldExists = true;
          clinicAdFree = clinicData.isAdFree;
        }
        if (typeof clinicData.isAiEnabled === 'boolean') {
          clinicAiFieldExists = true;
          clinicAiEnabled = clinicData.isAiEnabled;
        }
        if (clinicFieldExists || clinicAiFieldExists) break;
        break;
      }

      const resolvedAdFree = clinicFieldExists
        ? clinicAdFree
        : (userAdFree !== null ? userAdFree : false);

      // Getter Flutter: isAdFree => manualOverride || _isAdFree (resolvedAdFree)
      return manualOverride || resolvedAdFree;
    }

    var __rrUserSubscriptionUnsub = null;

    function stopUserSubscriptionListener() {
      if (typeof __rrUserSubscriptionUnsub === 'function') {
        __rrUserSubscriptionUnsub();
        __rrUserSubscriptionUnsub = null;
      }
    }

    function startUserSubscriptionListener(user) {
      stopUserSubscriptionListener();
      const uid = resolveEffectiveAuthUid(user);
      if (!uid) return;
      __rrUserSubscriptionUnsub = firebase
        .firestore()
        .collection('users')
        .doc(uid)
        .onSnapshot(
          async function () {
            try {
              const isAdFree = await resolveIsAdFreeForUser(user);
              __rrIsAdFreeUser = !!isAdFree;
              if (isAdFree) {
                hideAdsColumn();
              } else {
                showAdsColumn();
              }
            } catch (e) {
              console.warn('[RedVet ads] error re-evaluando suscripción:', e);
            }
          },
          function (err) {
            console.warn('[RedVet ads] listener users falló:', err);
          }
        );
    }

    window.__rrDebugAdPolicy = async function () {
      const adRight = document.getElementById('rr-ad-right');
      const user = firebase.auth().currentUser;
      const report = {
        windowInnerWidth: window.innerWidth,
        minWidthForAds: RR_ADS_MIN_WIDTH + 1,
        isWindowWideEnough: isWindowWideEnoughForAds(),
        shellIsAdFreeUser: __rrIsAdFreeUser,
        adColumnDisplay: adRight ? adRight.style.display : null,
        adColumnComputedDisplay: adRight
          ? window.getComputedStyle(adRight).display
          : null,
        loggedIn: !!user,
        uid: user ? user.uid : null,
      };

      if (user) {
        try {
          const db = firebase.firestore();
          const userDoc = await db.collection('users').doc(user.uid).get();
          const userData = userDoc.exists ? userDoc.data() : {};
          report.users = {
            isAdFree: userData.isAdFree,
            isAdFreeType: typeof userData.isAdFree,
            isAiEnabled: userData.isAiEnabled,
            isAdFreeManualOverride: userData.isAdFreeManualOverride,
            associatedClinicIds: userData.associatedClinicIds,
            clinicId: userData.clinicId,
            entitlementIds: userData.entitlementIds,
          };

          const clinicDoc = await db.collection('clinics').doc(user.uid).get();
          report.clinics_uid = clinicDoc.exists ? clinicDoc.data() : null;

          report.shellResolvedIsAdFree = await resolveIsAdFreeForUser(user);
        } catch (e) {
          report.error = String(e);
        }
      }

      console.table(report);
      return report;
    };

    async function applyAdFreePolicy() {
      try {
        const firebaseConfig = {
          apiKey: 'AIzaSyDQIQ4TK-AVtdzKb4WQ-6KSdFnHjCFcpuI',
          authDomain: 'redpetvet25.firebaseapp.com',
          projectId: 'redpetvet25',
          storageBucket: 'redpetvet25.firebasestorage.app',
          messagingSenderId: '482372343054',
          appId: '1:482372343054:web:16489394762c2cc938f35f',
        };
        if (!firebase.apps.length) {
          firebase.initializeApp(firebaseConfig);
        }
        firebase.auth().onAuthStateChanged(async function (user) {
          if (!user) {
            stopUserSubscriptionListener();
            __rrIsAdFreeUser = false;
            showAdsColumn();
            return;
          }
          // Mostrar publicidad mientras resolvemos (evita columna vacía para no suscriptores).
          __rrIsAdFreeUser = false;
          showAdsColumn();
          try {
            const isAdFree = await resolveIsAdFreeForUser(user);
            __rrIsAdFreeUser = !!isAdFree;
            if (isAdFree) {
              hideAdsColumn();
            } else {
              showAdsColumn();
            }
            startUserSubscriptionListener(user);
            if (typeof window.__rrHandlePendingWebCheckout === "function") {
              window.__rrHandlePendingWebCheckout().catch(function (e) {
                console.warn("[RedVet RC Web] checkout pendiente:", e);
              });
            }
          } catch (e) {
            console.warn('[RedVet ads] error resolviendo isAdFree:', e);
            __rrIsAdFreeUser = false;
            showAdsColumn();
          }
        });
      } catch (e) {
        showAdsColumn();
      }
    }

    applyAdFreePolicy();

    window.addEventListener('load', function () {
      // Usar loadEntrypoint para asegurar que _flutter.buildConfig sea inicializado por el loader
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: serviceWorkerVersion
        },
        onEntrypointLoaded: function (engineInitializer) {
          engineInitializer.initializeEngine({ hostElement: document.getElementById('rr-flutter-host') }).then(function (appRunner) {
            appRunner.runApp().then(function () {
              if (!__rrIsAdFreeUser) {
                showAdsColumn();
              }
            });
          });
        }
      });
    });

    // Cookie banner
    const cookieBanner = document.getElementById('cookieBanner');
    const cookieAccept = document.getElementById('cookieAccept');
    const cookieKey = 'rr_cookie_consent_v1';

    if (!localStorage.getItem(cookieKey)) {
      cookieBanner.style.display = 'block';
    }

    cookieAccept.addEventListener('click', function () {
      localStorage.setItem(cookieKey, 'accepted');
      cookieBanner.style.display = 'none';
    });

    var subscriptionsLink = document.getElementById('rr-subscriptions-link');
    if (subscriptionsLink) {
      subscriptionsLink.addEventListener('click', function (event) {
        event.preventDefault();
        event.stopPropagation();
        openSubscriptionsFromShell();
      });
    }

    var adBannerLink = document.getElementById('rr-ad-banner-link');
    if (adBannerLink) {
      __rrDefaultSidebarAdHtml = adBannerLink.innerHTML;
      adBannerLink.addEventListener('click', function (event) {
        event.preventDefault();
        event.stopPropagation();
        if (window.fbq) {
          fbq('trackCustom', 'RedVetApp_SidebarAd_Click');
        }
        if (__rrLocalSidebarAd && __rrLocalSidebarAd.campaignId) {
          var launched = launchSidebarAdTarget(__rrLocalSidebarAd.targetUrl);
          if (typeof window.__rrOnLocalSidebarAdClick === 'function') {
            window.__rrOnLocalSidebarAdClick(
              __rrLocalSidebarAd.campaignId,
              launched
            );
          }
          return;
        }
        openSubscriptionsFromShell();
      });
    }

    function openSubscriptionsFromShell() {
      var target = '#/subscription';
      if (window.location.hash === target) {
        window.dispatchEvent(new HashChangeEvent('hashchange'));
        return;
      }
      window.location.hash = target;
    }

  </script>
</body>
</html>
